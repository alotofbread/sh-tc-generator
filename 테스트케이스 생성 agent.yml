          \        processed_texts.append(text)\n\n    # 3. 모든 요구사항을 하나로 합침 (RAG 컨텍스트용)\n\
          \    full_text = \"\\n\\n\".join(processed_texts)\n    \n    # 4. RAG 검색에\
          \ 최적화된 핵심 쿼리 추출 (제목 + 업무내용 앞부분)\n    first_item = data_list[0] if data_list\
          \ else {}\n    search_query = f\"{first_item.get('title', '')} {first_item.get('description',\
          \ '')[:50]}\"\n\n    return {\n        \"convertedText\": full_text\n  \
          \  }"
