    - data:
        code: "import json\n\ndef main(jsonData):\n    # 1. 입력값이 문자열(String)로 들어올\
          \ 경우를 대비해 파싱\n    if isinstance(jsonData, str):\n        try:\n        \
          \    data_list = json.loads(jsonData)\n        except:\n            return\
          \ {\"error\": \"JSON 파싱에 실패했습니다.\"}\n    else:\n        data_list = jsonData\n\
          \n    # 결과물을 담을 리스트\n    processed_texts = []\n    \n    # 2. 각 항목을 서술형\
          \ 문장으로 변환\n    for item in data_list:\n        # 영문 키를 한글 명칭으로 매핑하며 문장 생성\n\
          \        text = (\n            f\"프로젝트 ID {item.get('projectId', '-')}의\
          \ '{item.get('title', '-')}'에 대한 요구사항입니다. \"\n            f\"상세 업무 내용은 다음과\
          \ 같습니다: {item.get('description', '-')}. \"\n            f\"이 작업은 {item.get('devType',\
          \ '-')} 개발 부문에 해당하며, \"\n            f\"{item.get('isNew', '-')} 과제입니다.\
